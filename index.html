<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Titel und Description werden via app.js aus kunde.json gesetzt -->
  <title>Hausmeisterservice Philipp Dehnhardt</title>
  <meta name="description" content="">

  <!-- SEO: Canonical + Robots -->
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:title"       content="Hausmeisterservice Philipp Dehnhardt">
  <meta property="og:description" content="Garten & Landschaftsbau, Renovierung und Innenausbau – professionell, zuverlässig, persönlich.">
  <meta property="og:locale"      content="de_DE">

  <!-- Google Fonts: Barlow Condensed (Display) + Barlow (Body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Zentrales Stylesheet -->
  <link rel="stylesheet" href="./style.css">
</head>
<!--
  data-page: Wird von app.js ausgelesen, um den seitenspezifischen
  Content-Renderer zu aktivieren.
-->
<body data-page="index">

  <!-- Mount: Navigation (app.js rendert hier die globale Nav) -->
  <div id="nav-mount"></div>

  <!-- Mount: Haupt-Inhalt (app.js rendert hier den seiten-spezifischen Inhalt) -->
  <main id="content-mount" aria-label="Hauptinhalt"></main>

  <!-- Mount: Footer (app.js rendert hier den globalen Footer) -->
  <div id="footer-mount"></div>

  <!-- Mount: Mobile Sticky Bar (app.js rendert hier die Action Bar) -->
  <div id="mobile-bar-mount"></div>

  <!-- Haupt-JavaScript: lädt kunde.json und rendert alles -->
  <script src="./app.js" defer></script>

</body>
</html>
